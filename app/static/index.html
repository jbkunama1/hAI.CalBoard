<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hAI.CalBoard</title>
  <link id="google-font" rel="stylesheet" href="">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: var(--font,'Segoe UI'),sans-serif; color:#fff; height:100vh; overflow:hidden; background:#111; }
    #background { position:fixed; inset:0; background-size:cover; background-position:center; transition:background-image 1.5s ease-in-out; z-index:0; }
    #bg-dim { position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:1; }

    /* ── LAYOUT ── */
    #overlay { position:relative; z-index:2; height:100vh; display:grid;
      grid-template-rows:auto 1fr;
      grid-template-columns:1fr auto;
      grid-template-areas:'header header' 'calendar weather';
      padding:28px 32px 20px; gap:16px 24px; }

    /* ── HEADER: Uhrzeit + Datum ── */
    #header { grid-area:header; display:flex; align-items:baseline; gap:24px; }
    #time { font-size:var(--font-size-time,6rem); font-weight:200; line-height:1; letter-spacing:-2px; text-shadow:0 2px 20px rgba(0,0,0,.6); }
    #date { font-size:var(--font-size-date,1.6rem); font-weight:300; opacity:.85; }

    /* ── WETTER (rechts oben) ── */
    #weather { grid-area:weather; display:none; flex-direction:column; align-items:flex-end; gap:2px; min-width:140px; }
    #weather.visible { display:flex; }
    #weather-city { font-size:.75rem; opacity:.5; text-transform:uppercase; letter-spacing:2px; }
    #weather-row { display:flex; align-items:center; gap:4px; }
    #weather-icon { width:48px; }
    #weather-temp { font-size:2.2rem; font-weight:200; }
    #weather-desc { font-size:.85rem; opacity:.7; }
    #weather-feels { font-size:.75rem; opacity:.45; }

    /* ── MONATSKALENDER ── */
    #calendar { grid-area:calendar; display:flex; flex-direction:column; gap:6px; overflow:hidden; }
    #cal-nav { display:flex; align-items:center; gap:12px; margin-bottom:2px; }
    #cal-month { font-size:1.1rem; font-weight:600; letter-spacing:1px; opacity:.9; }

    /* Wochentag-Header */
    #cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; flex:1; }
    .cal-dow { text-align:center; font-size:.7rem; font-weight:700; text-transform:uppercase;
      letter-spacing:1.5px; opacity:.45; padding-bottom:4px; }

    /* Tages-Zellen */
    .cal-day { border-radius:6px; padding:4px 5px; min-height:0;
      display:flex; flex-direction:column; gap:2px; overflow:hidden;
      background:rgba(255,255,255,0.04); }
    .cal-day.other-month { opacity:.3; }
    .cal-day.today { background:rgba(255,255,255,0.14); outline:2px solid rgba(255,255,255,.35); }
    .cal-day-num { font-size:.75rem; font-weight:700; opacity:.7; line-height:1; }
    .cal-day.today .cal-day-num { opacity:1; }

    /* Event-Chips */
    .cal-event { font-size:.62rem; font-weight:600; border-radius:3px;
      padding:1px 4px; line-height:1.4; overflow:hidden;
      white-space:nowrap; text-overflow:ellipsis; color:#fff; }
    .cal-event.allday { background:var(--accent,#4caf50); }

    /* Admin-Link */
    #admin-link { position:fixed; bottom:12px; right:14px; opacity:.15; transition:opacity .2s; z-index:10; }
    #admin-link:hover { opacity:.7; }
    #admin-link a { color:#fff; font-size:.7rem; text-decoration:none;
      background:rgba(0,0,0,.4); padding:4px 9px; border-radius:5px; }
  </style>
</head>
<body>
<div id="background"></div>
<div id="bg-dim"></div>
<div id="overlay">

  <div id="header">
    <div id="time">--:--</div>
    <div id="date">Lade...</div>
  </div>

  <div id="weather">
    <div id="weather-city"></div>
    <div id="weather-row">
      <img id="weather-icon" src="" alt="">
      <span id="weather-temp">--°</span>
    </div>
    <div id="weather-desc"></div>
    <div id="weather-feels"></div>
  </div>

  <div id="calendar">
    <div id="cal-nav">
      <div id="cal-month"></div>
    </div>
    <div id="cal-grid"></div>
  </div>

</div>
<div id="admin-link"><a href="/admin">⚙️ Admin</a></div>

<script>
let S = {}, allEvents = [], currentMonthOffset = 0;
const COLORS = ['#e53935','#8e24aa','#1e88e5','#00897b','#fb8c00','#43a047','#f4511e','#039be5','#7986cb','#33b679'];

// ── Hilfsfunktionen ──────────────────────────────────────────
function monthKey(d) { return d.getFullYear()*100 + d.getMonth(); }

function buildCalendar(events) {
  const today = new Date();
  const base  = new Date(today.getFullYear(), today.getMonth() + currentMonthOffset, 1);
  const year  = base.getFullYear();
  const month = base.getMonth();

  document.getElementById('cal-month').textContent =
    base.toLocaleDateString('de-DE', {month:'long', year:'numeric'});

  // Erste Zelle: Montag der Woche in der der 1. liegt
  const firstDay = new Date(year, month, 1);
  const startDow = (firstDay.getDay() + 6) % 7; // 0=Mo
  const start = new Date(year, month, 1 - startDow);

  // Events nach Datum-String indexieren
  const evByDate = {};
  events.forEach(ev => {
    const d = (ev.start || '').slice(0,10);
    if (!evByDate[d]) evByDate[d] = [];
    evByDate[d].push(ev);
  });

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Wochentag-Header
  ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  // Tages-Zellen (6 Wochen = 42 Zellen)
  const todayStr = today.toISOString().slice(0,10);
  for (let i = 0; i < 42; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const dStr = d.toISOString().slice(0,10);
    const isThisMonth = d.getMonth() === month;
    const isToday = dStr === todayStr;

    const cell = document.createElement('div');
    cell.className = 'cal-day' +
      (!isThisMonth ? ' other-month' : '') +
      (isToday      ? ' today'       : '');

    const num = document.createElement('div');
    num.className = 'cal-day-num';
    num.textContent = d.getDate();
    cell.appendChild(num);

    // Events
    const dayEvs = evByDate[dStr] || [];
    const maxShow = 3;
    dayEvs.slice(0, maxShow).forEach((ev, idx) => {
      const chip = document.createElement('div');
      const isAllDay = (ev.start || '').length === 10;
      const color = COLORS[idx % COLORS.length];
      chip.className = 'cal-event' + (isAllDay ? ' allday' : '');
      chip.style.background = color;
      let label = ev.title;
      if (!isAllDay) {
        const t = new Date(ev.start);
        label = t.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) + ' ' + ev.title;
      }
      chip.textContent = label;
      chip.title = label;
      cell.appendChild(chip);
    });
    if (dayEvs.length > maxShow) {
      const more = document.createElement('div');
      more.className = 'cal-event';
      more.style.background = 'rgba(255,255,255,.2)';
      more.textContent = '+' + (dayEvs.length - maxShow) + ' mehr';
      cell.appendChild(more);
    }

    grid.appendChild(cell);
  }
}

// ── Config ───────────────────────────────────────────────────
async function loadConfig() {
  const r = await fetch('/api/settings');
  S = await r.json();
  document.documentElement.style.setProperty('--font', S.font_family || 'Segoe UI');
  document.documentElement.style.setProperty('--font-size-time', (S.font_size_time || 6) + 'rem');
  document.documentElement.style.setProperty('--font-size-date', (S.font_size_date || 1.6) + 'rem');
  document.documentElement.style.setProperty('--accent', S.accent_color || '#4caf50');
  document.getElementById('bg-dim').style.opacity = 1 - (S.bg_brightness || 0.45) < 0.3 ? 0.3 : 1 - (S.bg_brightness || 0.45);
  if (S.show_weather) document.getElementById('weather').classList.add('visible');
}

// ── Hintergrund ───────────────────────────────────────────────
let bgIdx = 0;
function setBackground() {
  let url;
  if (S.bg_mode === 'custom' && S.custom_bg_images?.length) {
    url = S.custom_bg_images[bgIdx % S.custom_bg_images.length];
  } else {
    const q = S.bg_unsplash_query || 'city,night';
    url = `https://source.unsplash.com/1920x1080/?${q}&t=${Date.now()}`;
  }
  document.getElementById('background').style.backgroundImage = `url('${url}')`;
  bgIdx++;
}

// ── Uhrzeit ───────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const tf = S.time_format === '12h'
    ? {hour:'2-digit', minute:'2-digit', hour12:true}
    : {hour:'2-digit', minute:'2-digit'};
  if (S.show_seconds) tf.second = '2-digit';
  document.getElementById('time').textContent = now.toLocaleTimeString('de-DE', tf);
  const df = {weekday:'long', day:'numeric', month:'long'};
  document.getElementById('date').textContent = now.toLocaleDateString('de-DE', df);
}

// ── Wetter ────────────────────────────────────────────────────
async function loadWeather() {
  try {
    const d = await (await fetch('/api/weather')).json();
    document.getElementById('weather-temp').textContent = d.temp + '°';
    document.getElementById('weather-desc').textContent = d.description;
    document.getElementById('weather-feels').textContent = 'gefühlt ' + d.feels_like + '°';
    document.getElementById('weather-city').textContent = d.city;
    document.getElementById('weather-icon').src = `https://openweathermap.org/img/wn/${d.icon}@2x.png`;
  } catch(e) {}
}

// ── Kalender ─────────────────────────────────────────────────
async function loadCalendar() {
  try {
    allEvents = await (await fetch('/api/calendar')).json();
    buildCalendar(allEvents);
  } catch(e) { buildCalendar([]); }
}

// ── Init ─────────────────────────────────────────────────────
(async () => {
  await loadConfig();
  setBackground();
  updateClock();
  loadWeather();
  loadCalendar();
  setInterval(updateClock, 1000);
  setInterval(loadWeather, 10*60*1000);
  setInterval(loadCalendar, 5*60*1000);
  setInterval(setBackground, (S.bg_interval||30)*60*1000);
})()
</script>
</body>
</html>
