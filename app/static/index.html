<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hAI.CalBoard</title>
  <link id="google-font" rel="stylesheet" href="">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font, 'Segoe UI'), sans-serif; color: #fff; height: 100vh; overflow: hidden; }
    #background { position: fixed; inset: 0; background-size: cover; background-position: center; transition: background-image 1.5s ease-in-out; z-index: 0; }
    #overlay { position: relative; z-index: 1; padding: 40px 56px; height: 100vh; display: grid; grid-template-rows: auto 1fr; grid-template-columns: 1fr 340px; grid-template-areas: 'time-block weather-block' 'calendar-block calendar-block'; gap: 28px 40px; }
    #time-block { grid-area: time-block; }
    #time { font-size: var(--font-size-time, 7.5rem); font-weight: 100; line-height: 1; letter-spacing: -4px; text-shadow: 0 2px 24px rgba(0,0,0,0.5); }
    #date { font-size: var(--font-size-date, 1.5rem); opacity: 0.8; margin-top: 8px; font-weight: 300; }
    #weather-block { grid-area: weather-block; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    #weather-city { font-size: 0.9rem; opacity: 0.55; text-transform: uppercase; letter-spacing: 2px; }
    #weather-main { display: flex; align-items: center; gap: 6px; }
    #weather-icon { width: 60px; }
    #weather-temp { font-size: 2.8rem; font-weight: 200; }
    #weather-desc { font-size: 1rem; opacity: 0.75; }
    #weather-feels { font-size: 0.82rem; opacity: 0.5; }
    #calendar-block { grid-area: calendar-block; }
    #cal-header { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 3px; opacity: 0.45; margin-bottom: 10px; }
    #event-list { list-style: none; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 8px; }
    #event-list li { background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); border-left: 4px solid var(--accent, #4caf50); padding: 10px 16px; border-radius: 8px; font-size: var(--font-size-events, 1rem); }
    .event-time { font-size: 0.8rem; opacity: 0.6; margin-top: 3px; }
    .event-cal { font-size: 0.72rem; opacity: 0.4; margin-top: 2px; }
    #admin-link { position: fixed; bottom: 16px; right: 16px; opacity: 0.2; transition: opacity 0.2s; }
    #admin-link:hover { opacity: 0.8; }
    #admin-link a { color: #fff; font-size: 0.75rem; text-decoration: none; background: rgba(0,0,0,0.4); padding: 5px 10px; border-radius: 6px; }
  </style>
</head>
<body>
<div id="background"></div>
<div id="overlay">
  <div id="time-block">
    <div id="time">--:--</div>
    <div id="date">Lade...</div>
  </div>
  <div id="weather-block">
    <div id="weather-city"></div>
    <div id="weather-main">
      <img id="weather-icon" src="" alt="">
      <span id="weather-temp">--°C</span>
    </div>
    <div id="weather-desc"></div>
    <div id="weather-feels"></div>
  </div>
  <div id="calendar-block">
    <div id="cal-header">🗓️ Nächste Termine</div>
    <ul id="event-list"><li>Lade...</li></ul>
  </div>
</div>
<div id="admin-link"><a href="/admin">⚙️ Admin</a></div>
<script>
const UNSPLASH_BG = [
  'nature,landscape','architecture,minimal','mountains,sky','forest,morning','city,night'
];
let bgIdx = 0, S = {};

async function loadConfig() {
  const r = await fetch('/api/settings');
  S = await r.json();
  document.documentElement.style.setProperty('--font', S.font_family || 'Segoe UI');
  document.documentElement.style.setProperty('--font-size-time', (S.font_size_time || 7.5) + 'rem');
  document.documentElement.style.setProperty('--font-size-date', (S.font_size_date || 1.5) + 'rem');
  document.documentElement.style.setProperty('--font-size-events', (S.font_size_events || 1.0) + 'rem');
  document.documentElement.style.setProperty('--accent', S.accent_color || '#4caf50');
  document.getElementById('background').style.filter = `brightness(${S.bg_brightness || 0.45})`;
  if (!S.show_weather) document.getElementById('weather-block').style.display = 'none';
  if (!S.show_calendar) document.getElementById('calendar-block').style.display = 'none';
}

function getBgUrl() {
  if (S.bg_mode === 'custom' && S.custom_bg_images?.length) {
    return S.custom_bg_images[bgIdx % S.custom_bg_images.length];
  }
  const q = S.bg_unsplash_query || UNSPLASH_BG[bgIdx % UNSPLASH_BG.length];
  return `https://source.unsplash.com/1920x1080/?${q}&t=${Date.now()}`;
}

function setBackground() {
  document.getElementById('background').style.backgroundImage = `url('${getBgUrl()}')`;
  bgIdx++;
}

function updateClock() {
  const now = new Date();
  const tf = S.time_format === '12h' ? {hour:'2-digit',minute:'2-digit',hour12:true} : {hour:'2-digit',minute:'2-digit'};
  if (S.show_seconds) tf.second = '2-digit';
  document.getElementById('time').textContent = now.toLocaleTimeString('de-DE', tf);
  const df = S.date_format === 'short'
    ? {weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'}
    : {weekday:'long',day:'numeric',month:'long',year:'numeric'};
  document.getElementById('date').textContent = now.toLocaleDateString('de-DE', df);
}

async function loadWeather() {
  try {
    const d = await (await fetch('/api/weather')).json();
    document.getElementById('weather-temp').textContent = d.temp + '°C';
    document.getElementById('weather-desc').textContent = d.description;
    document.getElementById('weather-feels').textContent = '🧣 gefühlt ' + d.feels_like + '°C';
    document.getElementById('weather-city').textContent = '📍 ' + d.city;
    document.getElementById('weather-icon').src = `https://openweathermap.org/img/wn/${d.icon}@2x.png`;
  } catch(e) {}
}

async function loadCalendar() {
  try {
    const events = await (await fetch('/api/calendar')).json();
    const list = document.getElementById('event-list');
    list.innerHTML = '';
    if (!events.length) { list.innerHTML = '<li>Keine Termine</li>'; return; }
    const colors = ['#4caf50','#2196f3','#ff9800','#e91e63','#9c27b0','#00bcd4'];
    events.slice(0, S.max_events || 8).forEach((ev, i) => {
      const isAllDay = (ev.start || '').length === 10;
      const start = new Date(ev.start);
      const timeStr = isAllDay ? 'Ganztägig' : start.toLocaleString('de-DE', {weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      const li = document.createElement('li');
      li.style.borderLeftColor = colors[i % colors.length];
      li.innerHTML = `<div style="font-weight:500">${ev.title}</div><div class="event-time">🕒 ${timeStr}</div><div class="event-cal">📂 ${ev.calendar}</div>`;
      list.appendChild(li);
    });
  } catch(e) {}
}

(async () => {
  await loadConfig();
  setBackground();
  updateClock();
  loadWeather();
  loadCalendar();
  setInterval(updateClock, 1000);
  setInterval(loadWeather, 10*60*1000);
  setInterval(loadCalendar, 5*60*1000);
  setInterval(() => setBackground(), (S.bg_interval || 30)*60*1000);
})()
</script>
</body>
</html>
