<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hAI.CalBoard</title>
  <link id="google-font" rel="stylesheet" href="">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:var(--font,'Segoe UI'),sans-serif; color:#fff; height:100vh; overflow:hidden; background:#111; }
    #background { position:fixed; inset:0; background-size:cover; background-position:center; transition:background-image 1.5s ease-in-out; z-index:0; }
    #bg-dim { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1; pointer-events:none; }
    #app { position:relative; z-index:2; height:100vh; }
    #admin-link { position:fixed; bottom:12px; right:14px; opacity:.15; transition:opacity .2s; z-index:10; }
    #admin-link:hover { opacity:.7; }
    #admin-link a { color:#fff; font-size:.7rem; text-decoration:none; background:rgba(0,0,0,.4); padding:4px 9px; border-radius:5px; }

    /* ══ THEME: classic ══ */
    body.theme-classic #app {
      display:grid;
      grid-template-rows:auto 1fr;
      grid-template-columns:1fr 320px;
      grid-template-areas:'time weather' 'calendar calendar';
      padding:36px 48px 24px; gap:20px 32px;
    }
    body.theme-classic #time-block { grid-area:time; }
    body.theme-classic #weather-block { grid-area:weather; display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
    body.theme-classic #calendar-block { grid-area:calendar; }
    body.theme-classic #time { font-size:var(--fs-time,7.5rem); font-weight:100; line-height:1; letter-spacing:-4px; text-shadow:0 2px 24px rgba(0,0,0,.5); }
    body.theme-classic #date { font-size:var(--fs-date,1.5rem); opacity:.8; margin-top:8px; font-weight:300; }
    body.theme-classic #cal-header { font-size:.8rem; font-weight:600; text-transform:uppercase; letter-spacing:3px; opacity:.45; margin-bottom:10px; }
    body.theme-classic #event-list { list-style:none; display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:8px; }
    body.theme-classic #event-list li { background:rgba(255,255,255,.1); backdrop-filter:blur(8px); border-left:4px solid var(--accent,#4caf50); padding:10px 16px; border-radius:8px; font-size:var(--fs-events,1rem); }

    /* ══ THEME: month ══ */
    body.theme-month #app {
      display:grid;
      grid-template-rows:auto 1fr;
      grid-template-columns:1fr auto;
      grid-template-areas:'time weather' 'calendar calendar';
      padding:24px 28px 16px; gap:12px 20px;
    }
    body.theme-month #time-block { grid-area:time; display:flex; align-items:baseline; gap:20px; }
    body.theme-month #weather-block { grid-area:weather; display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
    body.theme-month #calendar-block { grid-area:calendar; overflow:hidden; }
    body.theme-month #time { font-size:var(--fs-time,5rem); font-weight:200; line-height:1; letter-spacing:-2px; }
    body.theme-month #date { font-size:var(--fs-date,1.4rem); font-weight:300; opacity:.85; align-self:center; }
    body.theme-month #cal-header { font-size:1rem; font-weight:600; letter-spacing:1px; opacity:.9; margin-bottom:6px; }
    /* Month grid */
    body.theme-month #month-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; height:calc(100% - 36px); }
    body.theme-month .cal-dow { text-align:center; font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; opacity:.4; padding-bottom:3px; }
    body.theme-month .cal-day { border-radius:5px; padding:3px 4px; display:flex; flex-direction:column; gap:2px; overflow:hidden; background:rgba(255,255,255,.04); }
    body.theme-month .cal-day.other-month { opacity:.25; }
    body.theme-month .cal-day.today { background:rgba(255,255,255,.14); outline:2px solid rgba(255,255,255,.35); }
    body.theme-month .cal-day-num { font-size:.7rem; font-weight:700; opacity:.7; line-height:1; }
    body.theme-month .cal-day.today .cal-day-num { opacity:1; }
    body.theme-month .cal-chip { font-size:.58rem; font-weight:600; border-radius:3px; padding:1px 4px; line-height:1.4; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; color:#fff; }

    /* ══ THEME: focus ══ */
    body.theme-focus #app { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; text-align:center; }
    body.theme-focus #time { font-size:var(--fs-time,14rem); font-weight:100; line-height:1; letter-spacing:-8px; text-shadow:0 4px 40px rgba(0,0,0,.6); }
    body.theme-focus #date { font-size:var(--fs-date,2.2rem); opacity:.7; margin-top:12px; font-weight:200; letter-spacing:2px; }
    body.theme-focus #weather-block, body.theme-focus #calendar-block { display:none !important; }

    /* ══ THEME: weather ══ */
    body.theme-weather #app {
      display:grid;
      grid-template-rows:auto 1fr auto;
      grid-template-areas:'time' 'weather' 'calendar';
      padding:40px 60px; gap:16px; align-items:center; text-align:center;
    }
    body.theme-weather #time-block { grid-area:time; }
    body.theme-weather #weather-block { grid-area:weather; display:flex; flex-direction:column; align-items:center; gap:6px; }
    body.theme-weather #calendar-block { grid-area:calendar; }
    body.theme-weather #time { font-size:var(--fs-time,5rem); font-weight:100; letter-spacing:-2px; }
    body.theme-weather #date { font-size:var(--fs-date,1.3rem); opacity:.7; margin-top:4px; }
    body.theme-weather #weather-icon { width:100px; }
    body.theme-weather #weather-temp { font-size:5rem; font-weight:100; }
    body.theme-weather #weather-desc { font-size:1.4rem; opacity:.8; }
    body.theme-weather #weather-feels { font-size:1rem; opacity:.5; }
    body.theme-weather #cal-header { font-size:.75rem; font-weight:600; text-transform:uppercase; letter-spacing:3px; opacity:.4; margin-bottom:8px; }
    body.theme-weather #event-list { list-style:none; display:flex; flex-wrap:wrap; justify-content:center; gap:8px; }
    body.theme-weather #event-list li { background:rgba(255,255,255,.1); backdrop-filter:blur(8px); border-left:4px solid var(--accent,#4caf50); padding:8px 14px; border-radius:8px; font-size:.9rem; }

    /* ══ THEME: compact (1024×800) ══ */
    body.theme-compact #app {
      display:grid;
      grid-template-rows:auto 1fr;
      grid-template-columns:1fr 200px;
      grid-template-areas:'time weather' 'calendar calendar';
      padding:18px 24px 12px; gap:10px 16px;
    }
    body.theme-compact #time-block { grid-area:time; }
    body.theme-compact #weather-block { grid-area:weather; display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
    body.theme-compact #calendar-block { grid-area:calendar; }
    body.theme-compact #time { font-size:var(--fs-time,4rem); font-weight:200; line-height:1; letter-spacing:-2px; }
    body.theme-compact #date { font-size:var(--fs-date,1rem); opacity:.7; margin-top:4px; }
    body.theme-compact #weather-temp { font-size:1.6rem; font-weight:200; }
    body.theme-compact #weather-icon { width:36px; }
    body.theme-compact #weather-desc, body.theme-compact #weather-feels { font-size:.72rem; opacity:.6; }
    body.theme-compact #cal-header { font-size:.7rem; text-transform:uppercase; letter-spacing:2px; opacity:.4; margin-bottom:6px; }
    body.theme-compact #event-list { list-style:none; display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:5px; }
    body.theme-compact #event-list li { background:rgba(255,255,255,.08); border-left:3px solid var(--accent,#4caf50); padding:6px 10px; border-radius:6px; font-size:.78rem; }

    /* ══ THEME: split ══ */
    body.theme-split #app {
      display:grid;
      grid-template-columns:1fr 1.3fr;
      grid-template-rows:1fr;
      grid-template-areas:'left right';
      padding:0; gap:0;
    }
    body.theme-split #left-col { grid-area:left; display:flex; flex-direction:column; justify-content:space-between; padding:40px 36px; border-right:1px solid rgba(255,255,255,.08); }
    body.theme-split #right-col { grid-area:right; display:flex; flex-direction:column; padding:24px 28px; overflow:hidden; }
    body.theme-split #time-block { }
    body.theme-split #time { font-size:var(--fs-time,6.5rem); font-weight:100; line-height:1; letter-spacing:-4px; }
    body.theme-split #date { font-size:var(--fs-date,1.3rem); opacity:.75; margin-top:8px; font-weight:300; }
    body.theme-split #weather-block { display:flex; flex-direction:column; gap:4px; }
    body.theme-split #weather-city { font-size:.75rem; opacity:.45; text-transform:uppercase; letter-spacing:2px; }
    body.theme-split #weather-main { display:flex; align-items:center; gap:4px; }
    body.theme-split #weather-temp { font-size:2.4rem; font-weight:200; }
    body.theme-split #weather-icon { width:52px; }
    body.theme-split #weather-desc { font-size:.9rem; opacity:.65; }
    body.theme-split #weather-feels { font-size:.78rem; opacity:.4; }
    body.theme-split #calendar-block { flex:1; overflow:hidden; }
    body.theme-split #cal-header { font-size:.95rem; font-weight:600; letter-spacing:1px; margin-bottom:8px; }
    body.theme-split #month-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; height:calc(100% - 36px); }
    body.theme-split .cal-dow { text-align:center; font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; opacity:.4; padding-bottom:3px; }
    body.theme-split .cal-day { border-radius:5px; padding:3px 4px; display:flex; flex-direction:column; gap:2px; overflow:hidden; background:rgba(255,255,255,.04); }
    body.theme-split .cal-day.other-month { opacity:.2; }
    body.theme-split .cal-day.today { background:rgba(255,255,255,.14); outline:2px solid rgba(255,255,255,.3); }
    body.theme-split .cal-day-num { font-size:.68rem; font-weight:700; opacity:.65; line-height:1; }
    body.theme-split .cal-day.today .cal-day-num { opacity:1; }
    body.theme-split .cal-chip { font-size:.56rem; font-weight:600; border-radius:3px; padding:1px 3px; line-height:1.4; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; color:#fff; }

    /* ══ SHARED WEATHER ══ */
    #weather-city { font-size:.85rem; opacity:.5; text-transform:uppercase; letter-spacing:2px; }
    #weather-main { display:flex; align-items:center; gap:6px; }
    #weather-icon { width:56px; }
    #weather-temp { font-size:2.6rem; font-weight:200; }
    #weather-desc { font-size:.95rem; opacity:.7; }
    #weather-feels { font-size:.8rem; opacity:.45; }
    .event-time { font-size:.78rem; opacity:.55; margin-top:2px; }
    .event-cal  { font-size:.7rem; opacity:.35; margin-top:1px; }
  </style>
</head>
<body>
<div id="background"></div>
<div id="bg-dim"></div>

<div id="app">
  <!-- LEFT COL only used by split -->
  <div id="left-col" style="display:none">
    <div id="time-block-left">
      <div id="time-l">--:--</div>
      <div id="date-l">Lade...</div>
    </div>
    <div id="weather-block-split">
      <div id="weather-city-s"></div>
      <div id="weather-main-s">
        <img id="weather-icon-s" src="" alt="">
        <span id="weather-temp-s">--°</span>
      </div>
      <div id="weather-desc-s"></div>
      <div id="weather-feels-s"></div>
    </div>
  </div>
  <div id="right-col" style="display:none">
    <div id="calendar-block-split">
      <div id="cal-header-split"></div>
      <div id="month-grid-split"></div>
    </div>
  </div>

  <!-- STANDARD BLOCKS -->
  <div id="time-block">
    <div id="time">--:--</div>
    <div id="date">Lade...</div>
  </div>
  <div id="weather-block">
    <div id="weather-city"></div>
    <div id="weather-main">
      <img id="weather-icon" src="" alt="">
      <span id="weather-temp">--°C</span>
    </div>
    <div id="weather-desc"></div>
    <div id="weather-feels"></div>
  </div>
  <div id="calendar-block">
    <div id="cal-header"></div>
    <ul id="event-list"></ul>
    <div id="month-grid"></div>
  </div>
</div>

<div id="admin-link"><a href="/admin">⚙️ Admin</a></div>

<script>
let S = {}, allEvents = [];
const CHIP_COLORS = ['#e53935','#8e24aa','#1e88e5','#00897b','#fb8c00','#43a047','#f4511e','#039be5','#7986cb','#33b679'];

// ── THEME SETUP ─────────────────────────────────────────────
function applyTheme(theme) {
  const themes = ['classic','month','focus','weather','compact','split'];
  themes.forEach(t => document.body.classList.remove('theme-' + t));
  document.body.classList.add('theme-' + (theme || 'classic'));

  const isSplit = theme === 'split';
  const isMonth = theme === 'month' || isSplit;

  // Split: show col containers, hide standard blocks
  document.getElementById('left-col').style.display  = isSplit ? '' : 'none';
  document.getElementById('right-col').style.display = isSplit ? '' : 'none';
  document.getElementById('time-block').style.display     = isSplit ? 'none' : '';
  document.getElementById('weather-block').style.display  = isSplit ? 'none' : '';
  document.getElementById('calendar-block').style.display = isSplit ? 'none' : '';

  // Show/hide month grid vs event list
  document.getElementById('month-grid').style.display   = (!isSplit && isMonth) ? '' : 'none';
  document.getElementById('event-list').style.display   = (!isSplit && !isMonth) ? '' : 'none';
  document.getElementById('month-grid-split').style.display = isSplit ? '' : 'none';

  // Compact: max 5 events
  if (theme === 'compact') S._maxEv = 5;
  else if (theme === 'weather') S._maxEv = 3;
  else S._maxEv = S.max_events || 8;
}

// ── MONTH GRID BUILDER ──────────────────────────────────────
function buildMonthGrid(gridEl, events) {
  const today    = new Date();
  const year     = today.getFullYear();
  const month    = today.getMonth();
  const firstDay = new Date(year, month, 1);
  const startDow = (firstDay.getDay() + 6) % 7;
  const start    = new Date(year, month, 1 - startDow);
  const todayStr = today.toISOString().slice(0,10);
  const monthName = today.toLocaleDateString('de-DE',{month:'long',year:'numeric'});

  // Set header
  const hdrId = gridEl.id === 'month-grid-split' ? 'cal-header-split' : 'cal-header';
  const hdr = document.getElementById(hdrId);
  if (hdr) hdr.textContent = '📅 ' + monthName;

  const evByDate = {};
  events.forEach(ev => {
    const d = (ev.start || '').slice(0,10);
    if (!evByDate[d]) evByDate[d] = [];
    evByDate[d].push(ev);
  });

  gridEl.innerHTML = '';
  ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    gridEl.appendChild(el);
  });

  for (let i = 0; i < 42; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const dStr = d.toISOString().slice(0,10);
    const cell = document.createElement('div');
    cell.className = 'cal-day'
      + (d.getMonth() !== month ? ' other-month' : '')
      + (dStr === todayStr ? ' today' : '');
    const num = document.createElement('div');
    num.className = 'cal-day-num';
    num.textContent = d.getDate();
    cell.appendChild(num);
    (evByDate[dStr] || []).slice(0,3).forEach((ev, idx) => {
      const chip = document.createElement('div');
      chip.className = 'cal-chip';
      chip.style.background = CHIP_COLORS[idx % CHIP_COLORS.length];
      const isAllDay = (ev.start||'').length === 10;
      chip.textContent = isAllDay ? ev.title
        : new Date(ev.start).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) + ' ' + ev.title;
      chip.title = ev.title;
      cell.appendChild(chip);
    });
    if ((evByDate[dStr]||[]).length > 3) {
      const more = document.createElement('div');
      more.className = 'cal-chip';
      more.style.background = 'rgba(255,255,255,.2)';
      more.textContent = '+' + ((evByDate[dStr]||[]).length - 3) + ' mehr';
      cell.appendChild(more);
    }
    gridEl.appendChild(cell);
  }
}

// ── CONFIG ──────────────────────────────────────────────────
async function loadConfig() {
  const r = await fetch('/api/settings');
  S = await r.json();
  document.documentElement.style.setProperty('--font', S.font_family || 'Segoe UI');
  document.documentElement.style.setProperty('--fs-time',  (S.font_size_time  || 7.5) + 'rem');
  document.documentElement.style.setProperty('--fs-date',  (S.font_size_date  || 1.5) + 'rem');
  document.documentElement.style.setProperty('--fs-events',(S.font_size_events|| 1.0) + 'rem');
  document.documentElement.style.setProperty('--accent', S.accent_color || '#4caf50');
  const dim = 1 - (S.bg_brightness || 0.45);
  document.getElementById('bg-dim').style.background = `rgba(0,0,0,${Math.max(0.2,Math.min(0.85,dim))})`;
  applyTheme(S.theme || 'classic');
}

// ── BACKGROUND ──────────────────────────────────────────────
let bgIdx = 0;
function setBackground() {
  let url;
  if (S.bg_mode === 'custom' && S.custom_bg_images?.length) {
    url = S.custom_bg_images[bgIdx % S.custom_bg_images.length];
  } else {
    const q = S.bg_unsplash_query || 'city,night';
    url = `https://source.unsplash.com/1920x1080/?${q}&t=${Date.now()}`;
  }
  document.getElementById('background').style.backgroundImage = `url('${url}')`;
  bgIdx++;
}

// ── CLOCK ───────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const tf = S.time_format === '12h'
    ? {hour:'2-digit',minute:'2-digit',hour12:true}
    : {hour:'2-digit',minute:'2-digit'};
  if (S.show_seconds) tf.second = '2-digit';
  const timeStr = now.toLocaleTimeString('de-DE', tf);
  const df = {weekday:'long',day:'numeric',month:'long'};
  const dateStr = now.toLocaleDateString('de-DE', df);
  // standard
  document.getElementById('time').textContent = timeStr;
  document.getElementById('date').textContent = dateStr;
  // split
  const tl = document.getElementById('time-l');
  const dl = document.getElementById('date-l');
  if (tl) tl.textContent = timeStr;
  if (dl) dl.textContent = dateStr;
  // sync split time styles
  if (document.body.classList.contains('theme-split')) {
    tl.style.fontSize = getComputedStyle(document.documentElement).getPropertyValue('--fs-time');
    tl.style.fontWeight = '100';
    tl.style.letterSpacing = '-4px';
    tl.style.lineHeight = '1';
  }
}

// ── WEATHER ─────────────────────────────────────────────────
async function loadWeather() {
  try {
    const d = await (await fetch('/api/weather')).json();
    // standard
    document.getElementById('weather-temp').textContent = d.temp + '°';
    document.getElementById('weather-desc').textContent = d.description;
    document.getElementById('weather-feels').textContent = 'gefühlt ' + d.feels_like + '°';
    document.getElementById('weather-city').textContent = d.city;
    document.getElementById('weather-icon').src = `https://openweathermap.org/img/wn/${d.icon}@2x.png`;
    // split
    const ts = document.getElementById('weather-temp-s');
    const ds = document.getElementById('weather-desc-s');
    const fs = document.getElementById('weather-feels-s');
    const cs = document.getElementById('weather-city-s');
    const is = document.getElementById('weather-icon-s');
    if (ts) ts.textContent = d.temp + '°';
    if (ds) ds.textContent = d.description;
    if (fs) fs.textContent = 'gefühlt ' + d.feels_like + '°';
    if (cs) cs.textContent = d.city;
    if (is) is.src = `https://openweathermap.org/img/wn/${d.icon}@2x.png`;
  } catch(e) {}
}

// ── CALENDAR ────────────────────────────────────────────────
async function loadCalendar() {
  try {
    allEvents = await (await fetch('/api/calendar')).json();
  } catch(e) { allEvents = []; }
  renderCalendar();
}

function renderCalendar() {
  const theme = S.theme || 'classic';
  const isSplit = theme === 'split';
  const isMonth = theme === 'month' || isSplit;

  if (isMonth) {
    const gridEl = document.getElementById(isSplit ? 'month-grid-split' : 'month-grid');
    buildMonthGrid(gridEl, allEvents);
    return;
  }

  // Event list
  if (!S.show_calendar) return;
  document.getElementById('cal-header').textContent = '🗓️ Nächste Termine';
  const list = document.getElementById('event-list');
  list.innerHTML = '';
  if (!allEvents.length) { list.innerHTML = '<li>Keine Termine</li>'; return; }
  const colors = ['#4caf50','#2196f3','#ff9800','#e91e63','#9c27b0','#00bcd4'];
  allEvents.slice(0, S._maxEv || 8).forEach((ev, i) => {
    const isAllDay = (ev.start||'').length === 10;
    const start = new Date(ev.start);
    const timeStr = isAllDay ? 'Ganztägig'
      : start.toLocaleString('de-DE',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    const li = document.createElement('li');
    li.style.borderLeftColor = colors[i % colors.length];
    li.innerHTML = `<div style="font-weight:500">${ev.title}</div>
      <div class="event-time">🕒 ${timeStr}</div>
      <div class="event-cal">📂 ${ev.calendar}</div>`;
    list.appendChild(li);
  });
}

// ── INIT ────────────────────────────────────────────────────
(async () => {
  await loadConfig();
  setBackground();
  updateClock();
  loadWeather();
  loadCalendar();
  setInterval(updateClock, 1000);
  setInterval(loadWeather, 10*60*1000);
  setInterval(loadCalendar, 5*60*1000);
  setInterval(setBackground, (S.bg_interval||30)*60*1000);
})()
</script>
</body>
</html>
