<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hAI.CalBoard</title>
  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: var(--font, 'Segoe UI', system-ui, sans-serif);
      background: #000;
      color: #fff;
    }

    /* ── BACKGROUND ── */
    #bg {
      position: fixed; inset: 0; z-index: 0;
      background-size: cover; background-position: center;
      transition: opacity 1s ease;
    }
    #bg-overlay {
      position: fixed; inset: 0; z-index: 1;
      background: rgba(0,0,0,var(--overlay, 0.45));
    }

    /* ── APP LAYOUT ── */
    #app {
      position: relative; z-index: 2;
      width: 100vw; height: 100vh;
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto 1fr;
      grid-template-areas:
        'time weather'
        'calendar calendar';
      padding: var(--app-padding, 36px);
      gap: 24px;
    }

    /* ── TIME ── */
    #time-block { grid-area: time; }
    #time {
      font-size: var(--fs-time, 7.5rem);
      font-weight: 700;
      line-height: 1;
      color: var(--time-color, #fff);
      letter-spacing: -2px;
    }
    #date {
      font-size: var(--fs-date, 1.5rem);
      color: var(--date-color, rgba(255,255,255,.75));
      margin-top: 8px;
    }

    /* ── WEATHER ── */
    #weather-block {
      grid-area: weather;
      text-align: right;
      align-self: start;
    }
    #weather-temp { font-size: 2.5rem; font-weight: 700; }
    #weather-desc { font-size: 1rem; opacity: .75; margin-top: 4px; }
    #weather-icon { font-size: 2rem; }

    /* ── CALENDAR ── */
    #calendar-block { grid-area: calendar; overflow: hidden; }
    #event-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--event-gap, 8px);
    }

    /* ── CUSTOM COLORS via CSS-Variablen ── */
    #time  { color: var(--time-color, #fff); }
    #date  { color: var(--date-color, rgba(255,255,255,.75)); }

    /* Event-Karten nutzen --event-bg */
    body.theme-classic #event-list li,
    body.theme-weather #event-list li,
    body.theme-compact #event-list li {
      background: var(--event-bg, rgba(255,255,255,.1));
      gap: var(--event-gap, 8px);
    }

    /* Padding über Variable */
    body.theme-classic #app,
    body.theme-compact #app { padding: var(--app-padding, 36px); }

    /* ── EVENT CARDS ── */
    #event-list li {
      background: rgba(255,255,255,.1);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: var(--fs-events, 1rem);
      border: 1px solid rgba(255,255,255,.08);
      transition: background .2s;
    }
    #event-list li:hover { background: rgba(255,255,255,.15); }
    .ev-title { font-weight: 600; }
    .ev-time  { font-size: .85em; opacity: .7; }
    .ev-color { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; margin-right: 6px; }

    /* ── THEMES ── */
    /* Classic (default) */
    body.theme-classic #app {
      grid-template-columns: 1fr auto;
      grid-template-rows: auto 1fr;
      grid-template-areas: 'time weather' 'calendar calendar';
    }

    /* Weather theme */
    body.theme-weather #app {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr;
      grid-template-areas: 'weather time' 'calendar calendar';
    }
    body.theme-weather #weather-block { text-align: left; }

    /* Compact theme */
    body.theme-compact #app {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto 1fr;
      grid-template-areas: 'time' 'weather' 'calendar';
      gap: 12px;
    }
    body.theme-compact #time { font-size: var(--fs-time, 4rem); }
    body.theme-compact #weather-block { text-align: left; }

    /* ── LAYOUT-PRESETS ── */
    /* time-bottom: grid-areas tauschen */
    body.layout-time-bottom.theme-classic #app {
      grid-template-areas: 'calendar calendar' 'time weather';
      grid-template-rows: 1fr auto;
    }
    /* time-center: Uhr mittig, Events rechts */
    body.layout-time-center.theme-classic #app {
      grid-template-columns: 1fr 1fr;
      grid-template-areas: 'time calendar' 'time calendar';
      grid-template-rows: 1fr;
      align-items: center;
    }
    /* weather-left: Wetter links, Rest rechts */
    body.layout-weather-left.theme-classic #app {
      grid-template-columns: 260px 1fr;
      grid-template-areas: 'weather time' 'weather calendar';
    }
    /* full-calendar: Uhr als kleine Kopfzeile */
    body.layout-full-calendar.theme-classic #app {
      grid-template-rows: auto 1fr;
      grid-template-areas: 'time time' 'calendar calendar';
    }
    body.layout-full-calendar.theme-classic #time { font-size: 2.5rem; }
    body.layout-full-calendar.theme-classic #weather-block { display: none; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 4px; }
  </style>
</head>
<body class="theme-classic">

<div id="bg"></div>
<div id="bg-overlay"></div>

<div id="app">
  <div id="time-block">
    <div id="time">--:--</div>
    <div id="date"></div>
  </div>

  <div id="weather-block">
    <div id="weather-icon"></div>
    <div id="weather-temp"></div>
    <div id="weather-desc"></div>
  </div>

  <div id="calendar-block">
    <ul id="event-list"></ul>
  </div>
</div>

<script>
let CONFIG = {};
let bgImages = [], bgIndex = 0, bgTimer = null;

// ── CONFIG ──────────────────────────────────────────────
async function loadConfig() {
  try {
    const r = await fetch('/api/settings');
    CONFIG = await r.json();
  } catch(e) { CONFIG = {}; }

  const root = document.documentElement;
  const S = CONFIG;

  // Font & sizes
  root.style.setProperty('--font',       S.font_family  || 'Segoe UI');
  root.style.setProperty('--fs-time',    (S.font_size_time   || 7.5) + 'rem');
  root.style.setProperty('--fs-date',    (S.font_size_date   || 1.5) + 'rem');
  root.style.setProperty('--fs-events',  (S.font_size_events || 1.0) + 'rem');
  root.style.setProperty('--accent',     S.accent_color || '#4caf50');
  root.style.setProperty('--overlay',    S.bg_brightness != null ? S.bg_brightness : 0.45);

  // Theme-Customizer Variablen
  root.style.setProperty('--time-color',     S.theme_time_color     || '#ffffff');
  root.style.setProperty('--date-color',     S.theme_date_color     || 'rgba(255,255,255,0.75)');
  root.style.setProperty('--event-bg',       S.theme_event_bg       || 'rgba(255,255,255,0.10)');
  root.style.setProperty('--accent-opacity', S.theme_accent_opacity || '1');
  root.style.setProperty('--app-padding',    (S.theme_padding  || 36) + 'px');
  root.style.setProperty('--event-gap',      (S.theme_event_gap ||  8) + 'px');

  // Theme-Klasse setzen
  document.body.className = 'theme-' + (S.theme || 'classic');

  // Layout-Preset Klasse setzen
  const layoutPresets = ['time-top','time-bottom','time-center','weather-left','full-calendar'];
  layoutPresets.forEach(p => document.body.classList.remove('layout-' + p));
  document.body.classList.add('layout-' + (S.theme_layout_preset || 'time-top'));

  // Sichtbarkeit
  if (S.show_weather === false || S.show_weather === 'false') {
    document.getElementById('weather-block').style.display = 'none';
  }
  if (S.show_calendar === false || S.show_calendar === 'false') {
    document.getElementById('calendar-block').style.display = 'none';
  }

  // Hintergrund
  setupBackground();
}

// ── BACKGROUND ──────────────────────────────────────────
function setupBackground() {
  const S = CONFIG;
  const mode = S.bg_mode || 'unsplash';
  const interval = (parseInt(S.bg_interval) || 30) * 60 * 1000;

  if (mode === 'custom' && S.custom_bg_images && S.custom_bg_images.length) {
    bgImages = S.custom_bg_images;
    setBg(bgImages[0]);
    if (bgImages.length > 1) {
      bgTimer = setInterval(() => {
        bgIndex = (bgIndex + 1) % bgImages.length;
        setBg(bgImages[bgIndex]);
      }, interval);
    }
  } else if (mode === 'unsplash') {
    const q = encodeURIComponent(S.bg_unsplash_query || 'nature,landscape');
    const url = `https://source.unsplash.com/1920x1080/?${q}&t=${Date.now()}`;
    setBg(url);
    bgTimer = setInterval(() => {
      const u = `https://source.unsplash.com/1920x1080/?${q}&t=${Date.now()}`;
      setBg(u);
    }, interval);
  }
}

function setBg(url) {
  const bg = document.getElementById('bg');
  const tmp = new Image();
  tmp.onload = () => { bg.style.backgroundImage = `url('${url}')`; };
  tmp.src = url;
}

// ── CLOCK ───────────────────────────────────────────────
function updateClock() {
  const S = CONFIG;
  const tz = S.timezone || 'Europe/Berlin';
  const now = new Date();
  const opts = { timeZone: tz };

  // Zeit
  const h = parseInt(new Intl.DateTimeFormat('de-DE', {...opts, hour:'numeric', hour12: false}).format(now));
  const m = new Intl.DateTimeFormat('de-DE', {...opts, minute:'2-digit'}).format(now).padStart(2,'0');
  const showSec = S.show_seconds === true || S.show_seconds === 'true';
  const s = showSec ? ':' + new Intl.DateTimeFormat('de-DE', {...opts, second:'2-digit'}).format(now).padStart(2,'0') : '';

  let timeStr;
  if (S.time_format === '12h') {
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    timeStr = `${h12}:${m}${s} ${ampm}`;
  } else {
    timeStr = `${String(h).padStart(2,'0')}:${m}${s}`;
  }
  document.getElementById('time').textContent = timeStr;

  // Datum
  const fmt = S.date_format || 'long';
  let dateStr;
  if (fmt === 'iso') {
    dateStr = new Intl.DateTimeFormat('sv-SE', {...opts, year:'numeric', month:'2-digit', day:'2-digit'}).format(now);
  } else if (fmt === 'short') {
    dateStr = new Intl.DateTimeFormat('de-DE', {...opts, weekday:'short', day:'numeric', month:'2-digit'}).format(now);
  } else {
    dateStr = new Intl.DateTimeFormat('de-DE', {...opts, weekday:'long', day:'numeric', month:'long'}).format(now);
  }
  document.getElementById('date').textContent = dateStr;
}

// ── WEATHER ─────────────────────────────────────────────
async function loadWeather() {
  if (CONFIG.show_weather === false || CONFIG.show_weather === 'false') return;
  try {
    const r = await fetch('/api/weather');
    if (!r.ok) return;
    const d = await r.json();
    if (d.error) return;
    const icons = {
      '01d':'☀️','01n':'🌙','02d':'⛅','02n':'☁️','03d':'☁️','03n':'☁️',
      '04d':'☁️','04n':'☁️','09d':'🌧️','09n':'🌧️','10d':'🌦️','10n':'🌧️',
      '11d':'⛈️','11n':'⛈️','13d':'❄️','13n':'❄️','50d':'🌫️','50n':'🌫️'
    };
    document.getElementById('weather-icon').textContent = icons[d.weather?.[0]?.icon] || '🌡️';
    document.getElementById('weather-temp').textContent = Math.round(d.main?.temp) + '°C';
    document.getElementById('weather-desc').textContent = d.weather?.[0]?.description || '';
  } catch(e) {}
}

// ── CALENDAR ────────────────────────────────────────────
const EVENT_COLORS = {
  '1':'#e57373','2':'#81c784','3':'#64b5f6','4':'#ffb74d',
  '5':'#ba68c8','6':'#4db6ac','7':'#90a4ae','8':'#f06292',
  '9':'#aed581','10':'#7986cb','11':'#4dd0e1'
};

async function loadEvents() {
  if (CONFIG.show_calendar === false || CONFIG.show_calendar === 'false') return;
  try {
    const r = await fetch('/api/calendar');
    if (!r.ok) return;
    const d = await r.json();
    const list = document.getElementById('event-list');
    list.innerHTML = '';
    (d.events || []).forEach(ev => {
      const li = document.createElement('li');
      const color = EVENT_COLORS[ev.color] || CONFIG.accent_color || '#4caf50';
      const dot = `<span class="ev-color" style="background:${color}"></span>`;
      let timeStr = '';
      if (!ev.allDay && ev.start) {
        const tz = CONFIG.timezone || 'Europe/Berlin';
        const d = new Date(ev.start);
        timeStr = new Intl.DateTimeFormat('de-DE', {
          timeZone: tz, hour:'2-digit', minute:'2-digit',
          day:'numeric', month:'short'
        }).format(d);
      } else if (ev.allDay && ev.start) {
        const parts = ev.start.split('-');
        timeStr = `${parts[2]}.${parts[1]}. – ganztägig`;
      }
      li.innerHTML = `<div class="ev-title">${dot}${ev.title}</div><div class="ev-time">${timeStr}</div>`;
      list.appendChild(li);
    });
    if (!d.events?.length) {
      list.innerHTML = '<li style="opacity:.5;font-style:italic">Keine anstehenden Termine</li>';
    }
  } catch(e) {}
}

// ── INIT ─────────────────────────────────────────────────
async function init() {
  await loadConfig();
  updateClock();
  setInterval(updateClock, 1000);
  loadWeather();
  setInterval(loadWeather, 10 * 60 * 1000);
  loadEvents();
  setInterval(loadEvents, 5 * 60 * 1000);
}

init();
</script>
</body>
</html>
