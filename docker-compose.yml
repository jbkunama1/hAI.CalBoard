version: '3.8'
services:
  calboard:
    build: .
    container_name: hAI-CalBoard
    ports:
      - "4455:8080"
    env_file:
      - .env
    volumes:
      - ./app:/app
      - calboard_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  calboard_data:
